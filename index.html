<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Desain | Plus Jakarta Sans Edition</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        // Mengatur Plus Jakarta Sans sebagai font utama
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: { darkBg: '#0f0f0f' }
                }
            }
        }
    </script>
    <style>
        .masonry-grid { column-count: 2; column-gap: 16px; }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; column-gap: 24px; } }
        .masonry-item { break-inside: avoid; margin-bottom: 24px; }
        body { transition: background-color 0.4s, color 0.4s; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-zoom { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .img-placeholder { background-color: #e2e8f0; }
        .dark .img-placeholder { background-color: #1e1e1e; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 antialiased font-sans">

    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-darkBg/80 backdrop-blur-xl border-b border-slate-200/50 dark:border-white/10">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter uppercase italic">Creativeinstd</h1>
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/10 hover:scale-110 transition-all">
                <svg id="sun-icon" class="hidden w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <svg id="moon-icon" class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 118.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <!-- Headline Section -->
    <header class="max-w-4xl mx-auto px-6 pt-16 pb-12 text-center reveal">
        <h2 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-5 leading-[1.15]">
            Digital Experience <br class="hidden md:block"> & Visual Storytelling.
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
            Kumpulan karya terpilih dalam bidang Branding, UI/UX, dan Desain Visual. Fokus pada estetika minimalis dan fungsi yang bermakna.
        </p>
    </header>

    <!-- Main Feed -->
    <main class="max-w-6xl mx-auto px-6 py-4">
        <div class="masonry-grid reveal" style="animation-delay: 0.2s;">
            
            <!-- Item 1: CAROUSEL -->
            <div class="masonry-item group cursor-pointer relative" onclick="openPreview(['https://images.unsplash.com/photo-1551650975-87deedd944c3?q=80&w=1000', 'https://images.unsplash.com/photo-1523206489230-c012c64b2b48?q=80&w=1000', 'https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=1000'], 'UI Design')">
                <div class="absolute top-4 right-4 z-10 bg-black/30 backdrop-blur-md p-1.5 rounded-lg border border-white/20"><svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg></div>
                <img src="https://images.unsplash.com/photo-1551650975-87deedd944c3?q=80&w=1000" class="w-full rounded-[2rem] border border-slate-200 dark:border-white/5 shadow-sm group-hover:shadow-xl transition-all duration-500 img-placeholder">
            </div>

            <!-- Item 2: SINGLE -->
            <div class="masonry-item group cursor-pointer" onclick="openPreview('https://images.unsplash.com/photo-1626785774573-4b799315345d?q=80&w=1000', 'Branding')">
                <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?q=80&w=1000" class="w-full rounded-[2rem] border border-slate-200 dark:border-white/5 img-placeholder">
            </div>

            <!-- Item 3: SINGLE -->
            <div class="masonry-item group cursor-pointer" onclick="openPreview('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1000', 'Web Design')">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1000" class="w-full rounded-[2rem] border border-slate-200 dark:border-white/5 img-placeholder">
            </div>

            <!-- Item 4: CAROUSEL -->
            <div class="masonry-item group cursor-pointer relative" onclick="openPreview(['https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1000', 'https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?q=80&w=1000'], 'Identity')">
                <div class="absolute top-4 right-4 z-10 bg-black/30 backdrop-blur-md p-1.5 rounded-lg border border-white/20"><svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg></div>
                <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=1000" class="w-full rounded-[2rem] border border-slate-200 dark:border-white/5 img-placeholder">
            </div>

            <!-- Item 5: SINGLE -->
            <div class="masonry-item group cursor-pointer" onclick="openPreview('https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1000', 'Photography')">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1000" class="w-full rounded-[2rem] border border-slate-200 dark:border-white/5 img-placeholder">
            </div>

        </div>
    </main>

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 md:p-10">
        <div class="absolute inset-0 bg-white/20 dark:bg-black/40 backdrop-blur-3xl" onclick="closePreview()"></div>
        <div class="relative w-fit max-w-full animate-zoom flex flex-col items-center">
            
            <button onclick="closePreview()" class="absolute -top-12 right-0 md:-top-2 md:-right-14 text-slate-800 dark:text-white/80 transition-all">
                <svg class="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="relative rounded-[2.5rem] md:rounded-[3.5rem] overflow-hidden shadow-2xl border border-white/40 dark:border-white/10 bg-white/5 flex items-center">
                
                <button id="prevBtn" onclick="changeSlide(-1)" class="absolute left-5 z-20 w-12 h-12 flex items-center justify-center bg-white/20 backdrop-blur-xl rounded-full text-white hover:bg-white/40 hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>

                <div class="absolute top-7 left-8 z-10 px-4 py-2 bg-white/20 dark:bg-black/30 backdrop-blur-xl border border-white/30 dark:border-white/10 rounded-2xl">
                    <span id="preview-tag" class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-900 dark:text-white">Category</span>
                </div>
                
                <img id="preview-img" src="" alt="Preview" class="max-h-[75vh] md:max-h-[85vh] w-auto object-contain transition-all duration-300">

                <button id="nextBtn" onclick="changeSlide(1)" class="absolute right-5 z-20 w-12 h-12 flex items-center justify-center bg-white/20 backdrop-blur-xl rounded-full text-white hover:bg-white/40 hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <div id="carousel-dots" class="flex gap-2.5 mt-8 hidden"></div>
        </div>
    </div>

    <script>
        let currentImages = [];
        let currentIndex = 0;

        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            updateIcons();
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });

        function updateIcons() {
            if (html.classList.contains('dark')) { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
            else { sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark'); updateIcons();
        }

        const modal = document.getElementById('preview-modal');
        const previewImg = document.getElementById('preview-img');
        const previewTag = document.getElementById('preview-tag');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('carousel-dots');

        function openPreview(images, tag) {
            currentImages = Array.isArray(images) ? images : [images];
            currentIndex = 0;
            previewTag.innerText = tag;
            updateSlide();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function updateSlide() {
            previewImg.style.opacity = '0';
            setTimeout(() => {
                previewImg.src = currentImages[currentIndex];
                previewImg.style.opacity = '1';
            }, 100);

            if (currentImages.length > 1) {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                dotsContainer.classList.remove('hidden');
                renderDots();
            } else {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
                dotsContainer.classList.add('hidden');
            }
        }

        function changeSlide(direction) {
            currentIndex += direction;
            if (currentIndex >= currentImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentImages.length - 1;
            updateSlide();
        }

        function renderDots() {
            dotsContainer.innerHTML = '';
            currentImages.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `h-1.5 rounded-full transition-all duration-300 ${i === currentIndex ? 'bg-slate-900 dark:bg-white w-6' : 'bg-slate-300 dark:bg-white/20 w-1.5'}`;
                dotsContainer.appendChild(dot);
            });
        }

        function closePreview() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('hidden')) return;
            if (e.key === "Escape") closePreview();
            if (e.key === "ArrowRight") changeSlide(1);
            if (e.key === "ArrowLeft") changeSlide(-1);
        });
    </script>
</body>
</html>
