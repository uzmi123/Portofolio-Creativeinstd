<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Portfolio | Dual-Grid Layout</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES & THEMES --- */
        :root {
            --bg: #ffffff;
            --text: #111111;
            --text-light: #888888;
            --accent: #f2f2f2;
            --radius: 20px; /* Lebih kecil agar proporsional dengan gambar kecil */
            --container-padding: 10%;
            --img-height: 220px; /* Tinggi gambar per baris */
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dark-mode {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-light: #aaaaaa;
            --accent: #1a1a1a;
        }

        /* --- BASIC RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 30px var(--container-padding);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 1000;
            transition: var(--transition);
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }

        #theme-toggle {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text);
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        /* --- HERO --- */
        .hero {
            padding: 40px var(--container-padding) 60px;
        }

        .hero h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            line-height: 1;
            letter-spacing: -2px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .hero p {
            color: var(--text-light);
            font-size: 1rem;
            max-width: 500px;
        }

        /* --- CATEGORY SECTION --- */
        .category-section {
            margin-bottom: 70px;
        }

        .category-header {
            padding: 0 var(--container-padding);
            margin-bottom: 20px;
        }

        .category-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* --- DUAL STACK SLIDER (GRID) --- */
        .slider-outer {
            width: 100%;
            overflow: hidden;
        }

        .slider-inner {
            display: grid;
            /* Membuat 2 baris otomatis */
            grid-template-rows: repeat(2, var(--img-height));
            grid-auto-flow: column; /* Mengalir ke samping */
            grid-auto-columns: min-content;
            gap: 15px;
            padding: 0 var(--container-padding);
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            scroll-behavior: smooth;
        }

        .slider-inner::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .portfolio-card {
            scroll-snap-align: start;
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            background: var(--accent);
        }

        .portfolio-card:hover {
            transform: scale(0.97);
        }

        .portfolio-card img {
            height: 100%; /* Mengikuti tinggi row (220px) */
            width: auto;  /* Lebar otomatis sesuai aspect ratio */
            display: block;
            object-fit: cover;
            border-radius: var(--radius);
        }

        /* --- FOOTER --- */
        footer {
            padding: 50px var(--container-padding);
            border-top: 1px solid var(--accent);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            :root { 
                --container-padding: 6%; 
                --img-height: 160px; /* Lebih kecil di HP */
            }
            .hero h1 { font-size: 2.2rem; }
            .category-header h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PORTFOLIO.JS</div>
        <button id="theme-toggle">
            <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
        </button>
    </nav>

    <header class="hero">
        <h1>Selected <br>Graphic Works.</h1>
        <p>Koleksi desain kreatif dan identitas visual yang disusun secara sistematis.</p>
    </header>

    <!-- 1. FEED DAN STORY -->
    <div class="category-section">
        <div class="category-header"><h2>1. Feed dan Story</h2></div>
        <div class="slider-outer">
            <div class="slider-inner">
                <!-- Tambahkan banyak gambar di sini, otomatis akan terbagi 2 baris (atas-bawah) -->
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=600" alt="1"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?q=80&w=500" alt="2"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1493612276216-ee3925520721?q=80&w=700" alt="3"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=800" alt="4"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1611162618071-b39a2ad055fd?q=80&w=600" alt="5"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1611162616475-46b635cb6868?q=80&w=500" alt="6"></div>
            </div>
        </div>
    </div>

    <!-- 2. IDENTITAS VISUAL -->
    <div class="category-section">
        <div class="category-header"><h2>2. Identitas Visual (Branding)</h2></div>
        <div class="slider-outer">
            <div class="slider-inner">
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?q=80&w=700" alt="B1"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=600" alt="B2"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1634942550159-640d401bd351?q=80&w=800" alt="B3"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?q=80&w=500" alt="B4"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1626785774625-ddc7c8241314?q=80&w=900" alt="B5"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=600" alt="B6"></div>
            </div>
        </div>
    </div>

    <!-- 3. BANNER, FLYER, POSTER -->
    <div class="category-section">
        <div class="category-header"><h2>3. Banner, Flyer, Poster</h2></div>
        <div class="slider-outer">
            <div class="slider-inner">
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1583508915901-b5f84c1dcde1?q=80&w=700" alt="P1"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1623282033815-40b05d96c9bb?q=80&w=1000" alt="P2"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=600" alt="P3"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1603380353725-f8a4d39cc41e?q=80&w=800" alt="P4"></div>
            </div>
        </div>
    </div>

    <!-- 4. PRODUK FOTO -->
    <div class="category-section">
        <div class="category-header"><h2>4. Produk Foto</h2></div>
        <div class="slider-outer">
            <div class="slider-inner">
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=800" alt="PR1"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000" alt="PR2"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=900" alt="PR3"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?q=80&w=600" alt="PR4"></div>
            </div>
        </div>
    </div>

    <!-- 5. PACKAGING -->
    <div class="category-section">
        <div class="category-header"><h2>5. Packaging (Label/Sticker)</h2></div>
        <div class="slider-outer">
            <div class="slider-inner">
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1589939705384-5185137a7f0f?q=80&w=800" alt="PK1"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1559128010-7c1ad6e1b6a5?q=80&w=1000" alt="PK2"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1605648916361-9bc12ad6a569?q=80&w=900" alt="PK3"></div>
                <div class="portfolio-card"><img src="https://images.unsplash.com/photo-1501159596142-6320749007f3?q=80&w=700" alt="PK4"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Creative Portfolio — GitHub Pages Ready</p>
    </footer>

    <script>
        // DARK MODE TOGGLE
        const btn = document.getElementById('theme-toggle');
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');

        btn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            icon.innerText = isDark ? '☀️' : '🌙';
            text.innerText = isDark ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        if(localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            icon.innerText = '☀️';
            text.innerText = 'Light Mode';
        }

        // SMOOTH MOUSE WHEEL SCROLL
        const sliders = document.querySelectorAll('.slider-inner');
        
        sliders.forEach((slider) => {
            slider.addEventListener('wheel', (e) => {
                // Jika user scroll mouse vertikal (deltaY), ubah jadi scroll horizontal
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    // Menambahkan animasi scroll yang lebih halus
                    slider.scrollBy({
                        left: e.deltaY * 1.5, // 1.5 adalah multiplier kecepatan
                        behavior: 'auto' // 'auto' agar terasa responsif mengikuti jari/wheel
                    });
                }
            });
        });
    </script>
</body>
</html>
